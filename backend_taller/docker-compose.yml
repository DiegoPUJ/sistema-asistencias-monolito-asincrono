services:
  app:
    build: .
    container_name: assistance_app
    working_dir: /var/www
    volumes:
      - ./:/var/www

  worker:
    build: .
    container_name: assistance_worker
    working_dir: /var/www
    command: php artisan queue:work --tries=1 --timeout=120
    volumes:
      - ./:/var/www

  nginx:
    image: nginx:alpine
    container_name: assistance_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app